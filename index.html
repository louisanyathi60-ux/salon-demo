<!DOCTYPE html>
<html lang="en">
<head>

<style>
body {

}

.container {
  position: relative;

}

.container img {

/* clickable areas */
.btn {
  position: absolute;
  top: 32%;
  left: 50%;

  height: 50px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
  <!-- YOUR EXACT DESIGN IMAGE -->
  <img src="your-design.png" alt="Salon Website">

  <!-- clickable button -->
  <a href="#">
    <div class="btn"></div>
  </a>
</div>

</body>
</html>
