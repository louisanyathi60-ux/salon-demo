<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glamour Salon</title>

<style>
body {
  margin: 0;
  background: #fff;
}

.container {
  position: relative;
  max-width: 1200px;
  margin: auto;
}

.container img {
  width: 100%;
  display: block;
}

/* OPTIONAL: clickable button area */
.book-btn {
  position: absolute;
  top: 32%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 220px;
  height: 55px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
  <!-- ✅ THIS IMAGE WILL ALWAYS LOAD -->
  <img src="https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?q=80&w=1200&auto=format&fit=crop" alt="Salon Website">

  <!-- Optional clickable area -->
  <a href="#">
    <div class="book-btn"></div>
  </a>
</div>

</body>
</html>
